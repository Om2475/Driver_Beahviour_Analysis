project:
  name: driver-behavior-ml
  random_seed: 42

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  features_data_dir: data/features
  reports_dir: reports
  models_dir: models

model:
  target: risk_score
  test_size: 0.2

features:
  schema_version: v2
  sampling_rate_hz: 10
  window_seconds: 10
  stride_seconds: 5
